# modify_font cell_height 120%
# Background
background_opacity 1
background_blur 1
background          #3b3228
foreground          #AFD2E9
selection_foreground #3b3228
selection_background #f8e2a0

# colors
        # black
color0              #3b3228
color8              #5d4f40
        # red
color1              #e86045
color9              #e86045
        # green
color2              #92a650
color10             #92a650
        # yellow
color3              #e68d53
color11             #e68d53
        # blue
color4              #c1a387
color12             #c1a387
        # magenta
color5              #f8e2a0
color13             #f8e2a0
        # cyan
color6              #3eccbe
color14             #3eccbe
        # white
color7              #afd2e9
color15             #afd2e9



color16   #3b3228
