<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias>
      <family>sans-serif</family>
      <prefer>
        <family>Noto-Sans Regular</family>
        <family>Mplus1-regular</family>
        <family>twemoji</family>
      </prefer>
  </alias>
  <alias>
      <family>serif</family>
      <prefer>
        <family>Noto-Serif Regular</family>
        <family>Mplus1-regular</family>
        <family>twemoji</family>
      </prefer>
  </alias>
  <alias>
      <family>monospace</family>
      <prefer>
        <family>ProggyCleanSZNerdFontMono</family>
        <family>x12y16pxMaruMonica</family>
        <family>twemoji</family>
      </prefer>
  </alias>
</fontconfig>
